# Test-only configuration.
#
# The production datasource is driven by environment variables (DB_URL, DB_USER,
# DB_PASS) that are absent in CI, which made the @SpringBootTest context-load test
# fail with "Driver com.mysql.cj.jdbc.Driver claims to not accept jdbcUrl, ${DB_URL}".
#
# This profile points the context-load test at an in-memory H2 database (H2 is
# already a runtime dependency). MODE=MySQL keeps H2 compatible with the MySQL
# syntax/dialect the app uses in production so the schema generates cleanly.
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# No external integrations are exercised during the context-load test.
spring.mail.username=
spring.mail.password=
gemini.api.key=
ai.service.api.key=
razorpay.key.id=
razorpay.key.secret=
firebase.credentials.json=
firebase.credentials.path=

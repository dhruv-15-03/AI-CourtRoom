spring.application.name=Court

# Production database configuration (uses environment variables)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Hibernate settings
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.jpa.open-in-view=false

# Server settings
server.port=${PORT:8081}

# Miscellaneous
spring.jackson.serialization.fail-on-empty-beans=false
management.endpoints.web.exposure.include=health,info

# CORS settings
spring.web.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,https://ai-court-room-iota.vercel.app}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Gemini AI Configuration
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.model=${GEMINI_API_MODEL:gemini-1.5-flash}

# Razorpay Payment Gateway Configuration
razorpay.key.id=${RAZORPAY_KEY_ID:}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:}

# Email Configuration (Gmail SMTP)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# Firebase Configuration (for mobile OTP)
firebase.credentials.path=${FIREBASE_CREDENTIALS_PATH:}
firebase.credentials.json=${FIREBASE_CREDENTIALS_JSON:}
firebase.project.id=${FIREBASE_PROJECT_ID:starter-e70f6}

# App Configuration
app.name=AI Courtroom

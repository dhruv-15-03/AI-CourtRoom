spring.application.name=Court

# Production database configuration (uses environment variables)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Hibernate settings
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.jpa.open-in-view=false

# Flyway database migrations.
# Disabled by default so existing deployments keep using Hibernate ddl-auto and do
# not crash on boot against a schema Flyway has never seen. Staged cutover to Flyway:
#   1. Deploy with FLYWAY_ENABLED=true. baseline-on-migrate stamps the current schema
#      as the baseline (V1) without altering data, then applies any V2+ scripts in
#      src/main/resources/db/migration.
#   2. Once Flyway owns the schema, set DDL_AUTO=validate so Hibernate only verifies
#      the schema Flyway produced instead of mutating it.
# Until then both default to the safe, backwards-compatible behaviour.
spring.flyway.enabled=${FLYWAY_ENABLED:false}
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.locations=classpath:db/migration

# Server settings
server.port=${PORT:8081}

# Miscellaneous
spring.jackson.serialization.fail-on-empty-beans=false
management.endpoints.web.exposure.include=health,info
# Disable the auto-configured SMTP/mail health probe. Render blocks outbound SMTP,
# so the probe hangs and reports the whole /actuator/health as DOWN (503) even though
# the database is up and mail still sends on demand. This caused Render's health check
# to fail and restart the instance in a loop.
management.health.mail.enabled=false

# CORS settings
spring.web.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,https://ai-court-room-iota.vercel.app}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Gemini AI Configuration
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.model=${GEMINI_API_MODEL:gemini-1.5-flash}

# AI Case Analysis ML Service Configuration
ai.service.url=${AI_SERVICE_URL:https://ai-court-ai.onrender.com/api}
# Shared secret sent as the X-API-Key header to the Python AI service.
# Must match the AI service's API_KEY. Leave empty only for local development.
ai.service.api.key=${AI_SERVICE_API_KEY:}

# Razorpay Payment Gateway Configuration
razorpay.key.id=${RAZORPAY_KEY_ID:}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:}
# Secret configured in the Razorpay dashboard for webhook signature verification.
razorpay.webhook.secret=${RAZORPAY_WEBHOOK_SECRET:}

# Email Configuration (Gmail SMTP)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# Firebase Configuration (for mobile OTP)
firebase.credentials.path=${FIREBASE_CREDENTIALS_PATH:}
firebase.credentials.json=${FIREBASE_CREDENTIALS_JSON:}
firebase.project.id=${FIREBASE_PROJECT_ID:starter-e70f6}

# App Configuration
app.name=AI Courtroom

# Rate limiting (in-memory token bucket, per instance). Disable with RATE_LIMIT_ENABLED=false.
# Capacity = burst size; refill-per-minute = sustained requests/min that refill the bucket.
ratelimit.enabled=${RATE_LIMIT_ENABLED:true}
# Auth (login/signup), keyed by client IP.
ratelimit.auth.capacity=${RATE_LIMIT_AUTH_CAPACITY:10}
ratelimit.auth.refill-per-minute=${RATE_LIMIT_AUTH_REFILL:10}
# OTP / verification endpoints (send + verify), keyed by client IP.
ratelimit.otp.capacity=${RATE_LIMIT_OTP_CAPACITY:8}
ratelimit.otp.refill-per-minute=${RATE_LIMIT_OTP_REFILL:8}
# AI proxy endpoints, keyed by authenticated user (falls back to IP).
ratelimit.ai.capacity=${RATE_LIMIT_AI_CAPACITY:30}
ratelimit.ai.refill-per-minute=${RATE_LIMIT_AI_REFILL:30}
